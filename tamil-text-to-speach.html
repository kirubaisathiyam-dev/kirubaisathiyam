<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamil Text To Speach</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #d7dce5;
      --text: #172033;
      --muted: #5f6b80;
      --accent: #0f62fe;
      --accent-dark: #0b4ecc;
      --danger: #c62828;
      --success: #147d3f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 360px;
      resize: vertical;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #586274;
    }

    button.secondary:hover {
      background: #445064;
    }

    .status {
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 120px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 12px;
      overflow: auto;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .meta .field {
      margin-bottom: 0;
    }

    .ok { color: var(--success); }
    .error { color: var(--danger); }

    @media (max-width: 900px) {
      .grid,
      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <h1>Tamil Text To Speach</h1>
      <p>Paste your devotional array, clean the devotion text, remove verse references and English words, then generate ElevenLabs audio files from each <code>am</code> and <code>pm</code> block.</p>
    </div>

    <div class="panel">
      <div class="meta">
        <div class="field">
          <label for="apiKey">ElevenLabs API Key</label>
          <input id="apiKey" type="password" placeholder="xi-api-key" value="sk_ba16656716e102269a6b02bf86cb93671ff36f0c113cb71a">
        </div>
        <div class="field">
          <label for="voiceId">Voice ID</label>
          <input id="voiceId" type="text" placeholder="Voice ID" value="0Xr3l2lRTBCHqKRYOVtZ">
        </div>
        <div class="field">
          <label for="modelId">Model ID</label>
          <input id="modelId" type="text" value="eleven_multilingual_v2">
        </div>
      </div>
      <div class="meta" style="margin-top: 12px;">
        <div class="field">
          <label for="outputFormat">Output Format</label>
          <select id="outputFormat">
            <option value="mp3_44100_128">mp3_44100_128</option>
            <option value="mp3_44100_192">mp3_44100_192</option>
            <option value="pcm_44100">pcm_44100</option>
          </select>
        </div>
        <div class="field">
          <label for="stability">Stability</label>
          <input id="stability" type="number" min="0" max="1" step="0.05" value="0.45">
        </div>
        <div class="field">
          <label for="similarity">Similarity Boost</label>
          <input id="similarity" type="number" min="0" max="1" step="0.05" value="0.8">
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="field">
          <label for="arrayInput">Input Array</label>
          <textarea id="arrayInput" spellcheck="false" placeholder='[
  {
    "date": "01 Jan",
    "am": { "audio": "/audio/01-jan-am.mp3", "devotion": "..." },
    "pm": { "audio": "/audio/01-jan-pm.mp3", "devotion": "..." }
  }
]'></textarea>
        </div>
        <div class="toolbar">
          <button id="previewButton" type="button">Preview Cleaned JSON</button>
          <button id="generateButton" type="button">Generate Audio</button>
          <button id="downloadJsonButton" class="secondary" type="button">Download Cleaned JSON</button>
        </div>
      </div>

      <div class="panel">
        <div class="field">
          <label for="cleanedOutput">Cleaned JSON Preview</label>
          <textarea id="cleanedOutput" spellcheck="false" readonly></textarea>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="field">
        <label>Status Log</label>
        <div id="status" class="status">Ready.</div>
      </div>
    </div>
  </div>

  <script>
    const arrayInput = document.getElementById("arrayInput");
    const cleanedOutput = document.getElementById("cleanedOutput");
    const statusBox = document.getElementById("status");

    document.getElementById("previewButton").addEventListener("click", previewCleanedJson);
    document.getElementById("generateButton").addEventListener("click", generateAudioFiles);
    document.getElementById("downloadJsonButton").addEventListener("click", downloadCleanedJson);

    function log(message) {
      const time = new Date().toLocaleTimeString();
      statusBox.textContent += `\n[${time}] ${message}`;
      statusBox.scrollTop = statusBox.scrollHeight;
    }

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function parseInputArray() {
      const raw = arrayInput.value.trim();

      if (!raw) {
        throw new Error("Input array is empty.");
      }

      try {
        return JSON.parse(raw);
      } catch (jsonError) {
        try {
          const normalized = raw
            .replace(/^\s*(const|let|var)\s+\w+\s*=\s*/u, "")
            .replace(/;\s*$/u, "");
          return Function(`"use strict"; return (${normalized});`)();
        } catch (jsError) {
          throw new Error(`Unable to parse input array. ${jsonError.message}`);
        }
      }
    }

    function normalizeDevotionText(text) {
      let value = String(text ?? "");

      value = value
        .replace(/\\r\\n|\\n|\\r/gu, "\n")
        .replace(/\r\n?/gu, "\n")
        .replace(/\\t/gu, " ")
        .replace(/\\"/gu, '"')
        .replace(/\\'/gu, "'")
        .replace(/\\\\/gu, "\\")
        .normalize("NFC");

      value = value
        .replace(/\u200B|\u200C|\u200D|\uFEFF/gu, "")
        .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/gu, " ");

      value = value
        .replace(/\(\s*[^()]*\d+\s*:\s*\d+[^()]*\)/gu, " ")
        .replace(/\[\s*[^()[\]]*\d+\s*:\s*\d+[^()[\]]*\]/gu, " ");

      value = value
        .replace(/[A-Za-z][A-Za-z .,'":;!?-]*/gu, " ")
        .replace(/\b\d+\s*[A-Za-z]+\b/gu, " ")
        .replace(/[\u2018\u2019\u201C\u201D"']/gu, " ")
        .replace(/[,:;]+/gu, ", ")
        .replace(/\s*\n\s*/gu, "\n")
        .replace(/[ \t]{2,}/gu, " ")
        .replace(/\n{3,}/gu, "\n\n");

      value = value
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean)
        .join("\n\n");

      return value.trim();
    }

    function buildCleanedData(data) {
      return data.map((entry) => {
        const next = { ...entry };

        for (const slot of ["am", "pm"]) {
          if (!entry[slot]) {
            continue;
          }

          next[slot] = {
            ...entry[slot],
            devotion: normalizeDevotionText(entry[slot].devotion)
          };
        }

        return next;
      });
    }

    function previewCleanedJson() {
      setStatus("Preparing cleaned preview...");

      try {
        const parsed = parseInputArray();
        const cleaned = buildCleanedData(parsed);
        cleanedOutput.value = JSON.stringify(cleaned, null, 2);
        setStatus("Cleaned preview ready.");
      } catch (error) {
        cleanedOutput.value = "";
        setStatus(`Error: ${error.message}`);
      }
    }

    function downloadCleanedJson() {
      try {
        const parsed = parseInputArray();
        const cleaned = buildCleanedData(parsed);
        const blob = new Blob([JSON.stringify(cleaned, null, 2)], { type: "application/json" });
        triggerDownload(blob, "cleaned-devotions.json");
        setStatus("Cleaned JSON downloaded.");
      } catch (error) {
        setStatus(`Error: ${error.message}`);
      }
    }

    async function generateAudioFiles() {
      setStatus("Starting audio generation...");

      const apiKey = document.getElementById("apiKey").value.trim();
      const voiceId = document.getElementById("voiceId").value.trim();
      const modelId = document.getElementById("modelId").value.trim();
      const outputFormat = document.getElementById("outputFormat").value;
      const stability = Number(document.getElementById("stability").value);
      const similarityBoost = Number(document.getElementById("similarity").value);

      if (!apiKey || !voiceId || !modelId) {
        setStatus("Error: API key, voice ID, and model ID are required.");
        return;
      }

      let cleaned;
      try {
        cleaned = buildCleanedData(parseInputArray());
        cleanedOutput.value = JSON.stringify(cleaned, null, 2);
      } catch (error) {
        setStatus(`Error: ${error.message}`);
        return;
      }

      let completed = 0;
      let skipped = 0;

      for (const entry of cleaned) {
        for (const slot of ["am", "pm"]) {
          const section = entry[slot];

          if (!section || !section.audio) {
            skipped += 1;
            log(`Skipped ${entry.date || "unknown"} ${slot}: missing audio path.`);
            continue;
          }

          const cleanedText = normalizeDevotionText(section.devotion);
          if (!cleanedText) {
            skipped += 1;
            log(`Skipped ${entry.date || "unknown"} ${slot}: devotion became empty after cleaning.`);
            continue;
          }

          const fileName = section.audio.split("/").filter(Boolean).pop() || `${slugify(entry.date || "item")}-${slot}.mp3`;

          try {
            log(`Generating ${fileName}`);
            const blob = await requestElevenLabsAudio({
              apiKey,
              voiceId,
              modelId,
              outputFormat,
              stability,
              similarityBoost,
              text: cleanedText
            });
            triggerDownload(blob, fileName);
            completed += 1;
            log(`Downloaded ${fileName}`);
          } catch (error) {
            log(`Failed ${fileName}: ${error.message}`);
          }
        }
      }

      setStatus(`Finished.\nGenerated: ${completed}\nSkipped: ${skipped}`);
    }

    async function requestElevenLabsAudio({
      apiKey,
      voiceId,
      modelId,
      outputFormat,
      stability,
      similarityBoost,
      text
    }) {
      const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${encodeURIComponent(voiceId)}`, {
        method: "POST",
        headers: {
          "xi-api-key": apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          text,
          model_id: modelId,
          output_format: outputFormat,
          voice_settings: {
            stability,
            similarity_boost: similarityBoost
          }
        })
      });

      if (!response.ok) {
        const details = await response.text();
        throw new Error(`${response.status} ${response.statusText} ${details}`.trim());
      }

      return await response.blob();
    }

    function triggerDownload(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function slugify(value) {
      return String(value)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }
  </script>
</body>
</html>
